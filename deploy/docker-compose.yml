version: '3.8'

services:
  # --- THE ENGINE (FastAPI Gateway) ---
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: cdb_bug_hunter_api
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cdb_network

  # --- THE SWARM (Distributed Workers) ---
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: celery -A scheduler.scheduler_engine worker --loglevel=info --concurrency=10
    env_file: ../.env
    depends_on:
      - redis
      - db
    networks:
      - cdb_network

  # --- THE ALERTER (WebSocket & Notification Engine) ---
  alerts:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: uvicorn alerts.recon_alert_engine:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file: ../.env
    depends_on:
      - redis
    networks:
      - cdb_network

  # --- THE INFRASTRUCTURE ---
  db:
    image: postgres:16-alpine
    container_name: cdb_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-bivash}
      POSTGRES_PASSWORD: ${DB_PASS:-CyberPass2026}
      POSTGRES_DB: bug_hunter_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bivash -d bug_hunter_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cdb_network

  redis:
    image: redis:7-alpine
    container_name: cdb_redis
    networks:
      - cdb_network

networks:
  cdb_network:
    driver: bridge

volumes:
  postgres_data: